# ===========================================================================
# Chitin Shell — Production Docker Compose
#
# 3 containers with network isolation:
#
#   chitin-agent   (LLM sandbox)   — chitin-isolated ONLY
#   chitin-policy  (verify layer)  — chitin-isolated + chitin-proxy (bridge)
#   chitin-proxy   (execute layer) — chitin-proxy ONLY (+ external access)
#
# Security guarantee:
#   The agent container CANNOT reach the proxy or the internet.
#   All actions flow through the policy engine.
# ===========================================================================

services:
  # -------------------------------------------------------------------------
  # Agent Container — LLM Sandbox
  # -------------------------------------------------------------------------
  agent:
    container_name: chitin-agent
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    networks:
      - chitin-isolated
    environment:
      - AGENT_PORT=3000
      - POLICY_URL=http://chitin-policy:3100
      - NODE_ENV=production
    # No secrets here — this is the whole point
    read_only: true
    tmpfs:
      - /tmp:size=50M
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      policy:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Policy Engine Container — Verify Layer
  # -------------------------------------------------------------------------
  policy:
    container_name: chitin-policy
    build:
      context: ..
      dockerfile: docker/Dockerfile.policy
    networks:
      - chitin-isolated
      - chitin-proxy
    environment:
      - POLICY_PORT=3100
      - PROXY_URL=http://chitin-proxy:3200
      - NODE_ENV=production
      # Uncomment to use custom policy file:
      # - POLICY_CONFIG_PATH=/app/config/policy.json
    volumes:
      # Mount policy config as read-only
      - ../config:/app/config:ro
    read_only: true
    tmpfs:
      - /tmp:size=50M
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:3100/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      proxy:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Secure Proxy Container — Execute Layer
  # -------------------------------------------------------------------------
  proxy:
    container_name: chitin-proxy
    build:
      context: ..
      dockerfile: docker/Dockerfile.proxy
    networks:
      - chitin-proxy
    environment:
      - PROXY_PORT=3200
      - VAULT_TYPE=memory
      - NODE_ENV=production
    env_file:
      - ./config/.env
    volumes:
      # Mount vault credentials as read-only
      - ./vault:/app/vault:ro
    read_only: true
    tmpfs:
      - /tmp:size=50M
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "node", "-e", "const h=require('http');h.get('http://localhost:3200/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3

# ===========================================================================
# Networks
# ===========================================================================
networks:
  # Agent <-> Policy ONLY. No external access.
  chitin-isolated:
    driver: bridge
    internal: true  # No external access — the key security constraint

  # Policy <-> Proxy. Proxy can reach external APIs.
  chitin-proxy:
    driver: bridge
    # NOT internal — proxy needs external access for real API calls
